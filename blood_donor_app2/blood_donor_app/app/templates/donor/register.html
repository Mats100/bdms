<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register as a Blood Donor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

    .container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
        background-color: #f5f5f5;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    h1 {
        font-size: 24px;
        margin-bottom: 20px;
        text-align: center;
        color: #333;
    }

    label {
        display: block;
        font-weight: bold;
        margin-top: 10px;
        margin-bottom: 10px;
    }

    input[type="text"],
    select {
        width: 80%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
     input[type="tel"],
    select {
        width: 80%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }
        input[type="number"],
    select {
        width: 80%;
        padding: 10px;
        font-size: 16px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    input[type="submit"] {
        padding: 10px 20px;
        font-size: 16px;
        background-color: #4caf50;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
    }

    input[type="submit"]:hover {
        background-color: #45a049;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Register as a Blood Donor</h1>
        <form method="POST">
            {{ form.csrf_token }}
            <div>
                <label for="name">Name:</label>
                <label>
                    <input type="text" name="name" placeholder="Name" required>
                </label>
            </div>
            <div>
                <label for="age">Age:</label>
                <label>
                    <input type="number" name="age" placeholder="Age" required>
                </label>
            </div>
            <div>
                <label for="contact_number">Contact Number:</label>
                <label>
                    <input type="tel" name="contact_number" placeholder="Contact Number" required>
                </label>
            </div>
            <div>
                <label for="blood_type">Blood Type:</label>
                {{ form.blood_type }}
            </div>
            <div>
                {{ form.submit }}
            </div>
        </form>
    </div>
</body>
</html>
