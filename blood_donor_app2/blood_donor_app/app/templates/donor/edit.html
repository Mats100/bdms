<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Donor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        form {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="text"],
        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4caf50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Edit Donor</h1>
    <form method="post" action="{{ url_for('main.edit_donor') }}">
        {{ form.csrf_token }}
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" value="{{ form.name.data }}" required><br><br>
        <label for="age">Age:</label>
        <input type="text" id="age" name="age" value="{{ form.age.data }}" required><br><br>
        <label for="name">Contact Number:</label>
        <label for="contact_number"></label><input type="text" id="contact_number" name="contact_number" value="{{ form.contact_number.data }}" required><br><br>
        <label for="blood_type">Blood Type:</label>
        <select id="blood_type" name="blood_type" required>
            {% for value, label in form.blood_type.choices %}
                <option value="{{ value }}" {% if value == form.blood_type.data %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select><br><br>

        <button type="submit">Update</button>
    </form>
</body>
</html>
