<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Donor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        form {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        input[type="text"],
        select {
            width: 90%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button[type="submit"] {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #4caf50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        hr {
            margin-top: 30px;
            margin-bottom: 30px;
            border: 0;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Edit Donor</h1>

    {% for donor in donors %}
        <form method="post" action="{{ url_for('main.edit_donor', donor_id=donor.id) }}">
            {{ form.csrf_token }}
            <h2>Profile of {{ donor.name }}</h2>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ donor.name }}" required><br><br>
            <label for="age">Age:</label>
            <input type="text" id="age" name="age" value="{{ donor.age }}" required><br><br>
            <label for="contact_number">Contact Number:</label>
            <input type="text" id="contact_number" name="contact_number" value="{{ donor.contact_number }}" required><br><br>
            <label for="blood_type">Blood Type:</label>
            <select id="blood_type" name="blood_type" required>
                {% for value, label in form.blood_type.choices %}
                    <option value="{{ value }}" {% if value == donor.blood_type %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select><br><br>
            <button type="submit">Update Donor</button>
        </form>
        <hr>
    {% endfor %}
</body>
</html>
