<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='plugins/izitoast/css/iziToast.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='admin/assets/css/login.css') }}">
</head>
<body>
<h1>Admin Login</h1>
<form method="POST" action="{{ url_for('admin.login') }}" onsubmit="return validateForm()">
    {{ form.hidden_tag() }}
    <div>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username">
    </div>
    <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password">
    </div>
    <div>
        <input type="submit" value="Login">
    </div>
</form>
<p>Don't have an account? <a href="{{ url_for('admin.register_admin') }}">Register here</a>.</p>
<p>Forgot your password? <a href="{{ url_for('admin.password_change') }}">Reset password</a>.</p>

<script type="text/javascript" src="{{ url_for('static', filename='admin/assets/js/login.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='plugins/izitoast/js/iziToast.min.js') }}"></script>
</body>
</html>
