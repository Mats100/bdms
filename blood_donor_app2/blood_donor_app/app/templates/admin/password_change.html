<!DOCTYPE html>
<html>
<head>
    <title>Password Change</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            text-align: center;
        }

        form {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f2f2f2;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        form div {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-weight: bold;
        }

        input[type="password"] {
            width: 100%;
            padding: 8px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            width: 100%;
            padding: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Password Change</h1>
    <form method="post" action="{{ url_for('admin.password_change') }}">
        {{ form.csrf_token }}
        <div>
            <label for="current_password">Current Password:</label>
            {{ form.current_password }}
        </div>
        <div>
            <label for="new_password">New Password:</label>
            {{ form.new_password }}
        </div>
        <div>
            <input type="submit" value="Change Password">
        </div>
    </form>
</body>
</html>
