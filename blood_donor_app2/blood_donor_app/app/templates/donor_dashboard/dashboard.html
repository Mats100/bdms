<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='plugins/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='donor_dashboard/assets/css/dashboard.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            padding-top: 20px;
        }

        .navbar {
            background-color: #ffffff;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
        }

        .navbar-nav .nav-link {
            padding: 10px;
            font-weight: bold;
            color: #333;
        }

        .navbar-nav .nav-link:hover {
            color: #4CAF50;
        }

        .container {
            margin-top: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 20px;
        }

        .dashboard-options {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .dashboard-option {
            width: 250px;
            margin: 10px;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: all 0.3s ease;
            border-radius: 5px;
            cursor: pointer;
        }

        .dashboard-option:hover {
            transform: scale(1.05);
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
        }

        .dashboard-option-icon {
            font-size: 40px;
            margin-bottom: 10px;
            color: #4CAF50;
        }

        .dashboard-option-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .dashboard-option-description {
            font-size: 14px;
            color: #777;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
    </nav>

    <div class="container">
        <h1>Welcome to the Donor Dashboard</h1>
         {% if session.donor_id %}
        <div class="dashboard-options">
            <a class="dashboard-option" href="{{ url_for('donor.search_donor') }}">
                <i class="dashboard-option-icon fas fa-search"></i>
                <div class="dashboard-option-title">Donor Search</div>
                <div class="dashboard-option-description">Find donors by blood type and location.</div>
            </a>

            <a class="dashboard-option" href="{{ url_for('donor.about') }}">
                <i class="dashboard-option-icon fas fa-info-circle"></i>
                <div class="dashboard-option-title">About Us</div>
                <div class="dashboard-option-description">Learn more about our organization.</div>
            </a>

            <a class="dashboard-option" href="{{ url_for('donor.update_profile') }}">
                <i class="dashboard-option-icon fas fa-user-edit"></i>
                <div class="dashboard-option-title">Update Profile</div>
                <div class="dashboard-option-description">Update your personal information.</div>
            </a>

            <a class="dashboard-option" href="{{ url_for('donor.forget_password') }}">
                <i class="dashboard-option-icon fas fa-key"></i>
                <div class="dashboard-option-title">Change Password</div>
                <div class="dashboard-option-description">Reset your account password.</div>
            </a>

            <a class="dashboard-option" href="{{ url_for('donor.logout') }}">
                <i class="dashboard-option-icon fas fa-sign-out-alt"></i>
                <div class="dashboard-option-title">Logout</div>
                <div class="dashboard-option-description">Sign out from your account.</div>
            </a>
        </div>
        {% endif %}
    </div>
    <script type="text/javascript" src="{{ url_for('static', filename='plugins/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
