<!DOCTYPE html>
<html>
<head>
    <title>Update Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            align-content: center;
            text-align: center;
        }

        form {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 20px;
            width: 500px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: #fff;
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Update Profile</h1>
    <form method="POST" action="{{ url_for('donor.update_profile') }}">
        {{ form.csrf_token }}

        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ donor.name }}">
        </div>

        <div>
            <label for="age">Age:</label>
            <input type="text" id="age" name="age" value="{{ donor.age }}">
        </div>

        <div>
            <label for="contact_number">Contact Number:</label>
            <input type="text" id="contact_number" name="contact_number" value="{{ donor.contact_number }}">
        </div>

        <div>
            <label for="address">Address:</label>
            <textarea id="address" name="address">{{ donor.address }}</textarea>
        </div>

        <div>
            <input type="submit" value="Update">
        </div>
    </form>
</body>
</html>
