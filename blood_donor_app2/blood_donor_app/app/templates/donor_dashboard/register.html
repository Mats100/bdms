<!DOCTYPE html>
<html>
<head>
    <title>Donor Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            align-content: center;
            text-align: center;
        }

        form {
            background-color: #fff;
            border: 1px solid #ccc;
            padding: 100px;
            width: 700px;
            margin: 0 auto;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="email"],
        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: #fff;
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }
    </style>
</head>
<body>
<h1>Donor Registration</h1>
<form method="POST" action="{{ url_for('donor.register') }}">
    {{ form.csrf_token }}

    <div class="form-group">
        <label for="donor_id">Donor ID:</label>
        <input type="text" id="donor_id" name="donor_id">
    </div>

    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">
    </div>

    <div class="form-group">
        <label for="age">Age:</label>
        <input type="text" id="age" name="age">
    </div>

    <div class="form-group">
        <label for="contact_number">Contact Number:</label>
        <input type="text" id="contact_number" name="contact_number">
    </div>

    <div class="form-group">
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email">
    </div>

    <div class="form-group">
        <label for="gender">Gender:</label>
        <select id="gender" name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select>
    </div>

    <div class="form-group">
        <label for="address">Address:</label>
        <textarea id="address" name="address"></textarea>
    </div>

    <div class="form-group">
        <label for="username">Username:</label>
       <input type="text" id="username" name="username">
    </div>

    <div class="form-group">
        <label for="password">Password:</label>
       <input type="text" id="password" name="password">
    </div>
    <h2>Health Details</h2>

    <div class="form-group">
        <label for="body_weight">Body Weight:</label>
        <input type="text" id="body_weight" name="body_weight">
    </div>
    <div class="form-group">
        <label for="blood_group">Blood Group:</label>
        <select id="blood_group" name="blood_group">
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select>
    </div>

    <div class="form-group">
        <label for="pulse_rate">Pulse Rate:</label>
        <input type="text" id="pulse_rate" name="pulse_rate">
    </div>

    <div class="form-group">
        <label for="haemoglobin">Haemoglobin:</label>
        <input type="text" id="haemoglobin" name="haemoglobin">
    </div>

    <div class="form-group">
        <label for="blood_pressure">Blood Pressure:</label>
        <input type="text" id="blood_pressure" name="blood_pressure">
    </div>

    <div class="form-group">
        <label for="temperature">Temperature:</label>
        <input type="text" id="temperature" name="temperature">
    </div>

    <h2>Health Security Check</h2>

    <div class="form-group">
        <label for="disease">Do you suffer from any disease?</label>
        <select id="disease" name="disease">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="form-group">
        <label for="allergies">Do you have any allergies?</label>
        <select id="allergies" name="allergies">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="form-group">
        <label for="positive_test">Have you ever had a positive blood test for HbsAg, Hcv, HIV?</label>
        <select id="positive_test" name="positive_test">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="form-group">
        <label for="cardiac_problems">Do you have any cardiac problems?</label>
        <select id="cardiac_problems" name="cardiac_problems">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="form-group">
        <label for="bleeding_disorders">Do you suffer from any bleeding disorders?</label>
        <select id="bleeding_disorders" name="bleeding_disorders">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div class="form-group">
        <label for="medication">Do you take any medication?</label>
        <select id="medication" name="medication">
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
    </div>

    <div>
        <input type="submit" value="Register">
    </div>
</form>
</body>
</html>
